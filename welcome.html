<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Welcome to NERAI &mdash; Access Details</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     background:linear-gradient(135deg,#0d1f3c 0%,#0a1628 100%);
     min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(0,119,168,0.25);
      border-radius:20px;padding:48px 40px;max-width:480px;width:100%;text-align:center;
      backdrop-filter:blur(10px)}
.logo{font-size:12px;letter-spacing:3px;color:#0077a8;text-transform:uppercase;
      font-weight:700;margin-bottom:32px}
.check{width:64px;height:64px;background:rgba(0,119,168,0.15);
       border:2px solid #0077a8;border-radius:50%;display:flex;align-items:center;
       justify-content:center;margin:0 auto 24px;font-size:28px}
.plan-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;
            font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:20px}
.plan-solo{background:rgba(0,119,168,0.2);color:#66aacc;border:1px solid rgba(0,119,168,0.4)}
.plan-pro {background:rgba(0,212,170,0.15);color:#7ed8c0;border:1px solid rgba(0,212,170,0.4)}
h1{font-size:26px;font-weight:700;color:#ffffff;margin-bottom:8px}
.sub{font-size:14px;color:#7a9ab8;margin-bottom:32px;line-height:1.6}
.code-box{background:rgba(0,0,0,0.3);border:1px solid rgba(0,119,168,0.3);
          border-radius:12px;padding:20px;margin-bottom:8px;cursor:pointer;
          transition:border-color .2s}
.code-box:hover{border-color:#0077a8}
.code-label{font-size:11px;letter-spacing:2px;color:#4a7a9a;text-transform:uppercase;
            margin-bottom:10px}
.code-value{font-size:22px;font-weight:800;color:#ffffff;letter-spacing:3px;
            font-family:'Courier New',monospace}
.copy-hint{font-size:11px;color:#3a5a7a;margin-bottom:24px}
.btn-dash{display:block;background:#0077a8;color:white;text-decoration:none;
          padding:16px 24px;border-radius:12px;font-weight:700;font-size:15px;
          margin-bottom:12px;transition:background .2s}
.btn-dash:hover{background:#005f87}
.features{background:rgba(0,0,0,0.2);border-radius:12px;padding:20px;
           margin-top:24px;text-align:left}
.features h3{font-size:11px;letter-spacing:2px;color:#4a7a9a;text-transform:uppercase;
             margin-bottom:12px}
.features li{color:#7a9ab8;font-size:13px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05);
             list-style:none;display:flex;gap:8px}
.features li:last-child{border:none}
.features li::before{content:'&#10003;';color:#0077a8}
.copied{color:#7ed8c0;font-size:12px;margin-top:4px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">&#9635; NERAI Intelligence</div>
  <div class="check">&#10003;</div>

  <div id="planBadge"></div>
  <h1>Payment Confirmed</h1>
  <p class="sub" id="subText">Your subscription is active. Use the code below to access the NERAI Intelligence Dashboard.</p>

  <div class="code-box" onclick="copyCode()">
    <div class="code-label">Your Access Code</div>
    <div class="code-value" id="codeValue">NERAI-PRO-26</div>
  </div>
  <div class="copy-hint">Click the code to copy &nbsp;&bull;&nbsp; Keep this safe</div>
  <div class="copied" id="copiedMsg">&#10003; Copied to clipboard!</div>

  <a href="https://nerai-intelligence.streamlit.app" class="btn-dash">Open NERAI Dashboard &rarr;</a>

  <div class="features">
    <h3 id="featTitle">Your Plan Includes</h3>
    <ul id="featList"></ul>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const plan = (params.get('plan') || 'pro').toLowerCase();

const plans = {
  solo: {
    code: 'NERAI-SOLO-26',
    badge: '<span class="plan-badge plan-solo">Solo Plan</span>',
    features: [
      'Web dashboard &mdash; 80+ countries',
      'All 20+ risk dimensions',
      'Daily index updates',
      'What-If scenario analysis',
      '3-month history',
      'Early access to new features'
    ]
  },
  pro: {
    code: 'NERAI-PRO-26',
    badge: '<span class="plan-badge plan-pro">Pro Plan</span>',
    features: [
      'Everything in Solo',
      '12-month full history',
      'Unlimited What-If scenarios',
      'CSV data export',
      'API access',
      'Country-specific risk alerts',
      'Priority support'
    ]
  }
};

const p = plans[plan] || plans.pro;
document.getElementById('planBadge').innerHTML = p.badge;
document.getElementById('codeValue').textContent = p.code;
document.getElementById('featList').innerHTML = p.features.map(f => '<li>' + f + '</li>').join('');

function copyCode() {
  const code = document.getElementById('codeValue').textContent;
  navigator.clipboard.writeText(code).then(() => {
    const msg = document.getElementById('copiedMsg');
    msg.style.display = 'block';
    setTimeout(() => { msg.style.display = 'none'; }, 2000);
  });
}
</script>
</body>
</html>
